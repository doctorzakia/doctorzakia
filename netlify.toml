[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/game"
  to = "/حروفي_المجسمة.html"
  status = 302

[[redirects]]
  from = "/jeu"
  to = "/حروفي_المجسمة.html"
  status = 302

[[redirects]]
  from = "/app"
  to = "/حروفي_المجسمة.html"
  status = 302
